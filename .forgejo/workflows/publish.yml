name: Publish

# Tag-triggered (from release.yml / prerelease.yml): build both .debs + the tarball and create the
# release on each forge. The GitHub mirror's release-macos.yml appends the signed .pkgs; the
# reconcile job here fans every asset out to all three registries (and backfills any historical gap).
# See packaging/README.md for the secrets.
on:
  push:
    # Stable (v1.2.3) and prerelease (v1.2.3-rc.N) tags both build here; the release helpers mark
    # the hyphenated ones as prereleases, and the tap job writes them to the separate -rc formula.
    tags: ["v*.*.*", "v*.*.*-*"]

permissions:
  contents: read

jobs:
  releases:
    name: Build .debs + tarball, create releases (Forgejo, NAS, GitHub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Both .debs are built through buildx, the way the sister repos build their arm64 images: the
      # docker-container BuildKit driver carries QEMU, so the arm64 leg emulates INSIDE the builder.
      # This runner is a Talos node with no usable host binfmt for a plain `docker run --platform
      # arm64` (that gets `exec format error`); buildx sidesteps it, and its context/output are
      # client-side streams so the DinD workspace-visibility problem doesn't apply either.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build both .debs (buildx) + the tarball
        run: |
          set -euo pipefail
          # Read the pins from the Python constants so there's ONE source of truth (Renovate-tracked).
          read_pin() { python3 -c "import re,sys; print(re.search(r'$1 = \"([^\"]+)\"', open('dreame_valetudo/constants.py').read()).group(1))"; }
          SREF="$(read_pin SUNXI_TOOLS_REF)"; PYUSB="$(read_pin PYUSB_VERSION)"
          export VERSION="${GITHUB_REF_NAME#v}"
          # renovate: datasource=pypi depName=pyinstaller
          PYINSTALLER="6.21.0"
          # nfpm packages the .debs. Pinned image; its digest IS the integrity check (Renovate-kept).
          # renovate: datasource=docker depName=goreleaser/nfpm
          NFPM="goreleaser/nfpm:v2.47.0@sha256:a662cb167d7b6d3a83920c83d76b12d02b8ac5dd2c13e5c62c15270b23f6df0c"

          build_deb() { # build_deb <docker-platform> <deb-arch>
            local plat="$1" arch="$2"
            # buildx builds the per-arch bundle (main tool + fastboot client + sunxi-fel) and exports
            # just those native binaries. The base image is pinned in deb.Dockerfile; the sunxi/pyusb/
            # pyinstaller pins ride in as build-args.
            rm -rf "out-$arch"
            docker buildx build --platform "$plat" \
              --build-arg SREF="$SREF" --build-arg PYUSB="$PYUSB" --build-arg PYINSTALLER="$PYINSTALLER" \
              -f packaging/deb.Dockerfile --target export --output "type=local,dest=out-$arch" .
            # Lay the exported binaries out where nfpm.yaml expects them, then package with the pinned
            # nfpm image. nfpm is arch-independent (DEB_ARCH only labels the package), so it runs on
            # the amd64 runner natively — via docker create+cp, since the DinD daemon can't bind-mount
            # the job workspace.
            rm -rf dist && mkdir dist
            cp "out-$arch/dreame-valetudo" "out-$arch/dreame-fastboot" dist/
            cp "out-$arch/sunxi-fel" ./sunxi-fel
            CID=$(docker create -e DEB_ARCH="$arch" -e VERSION -w /w "$NFPM" package -p deb -f packaging/nfpm.yaml -t "/w/dreame-valetudo_$arch.deb")
            docker cp . "$CID":/w
            docker start -a "$CID"
            docker cp "$CID":"/w/dreame-valetudo_$arch.deb" .
            docker rm "$CID" >/dev/null
          }
          build_deb linux/amd64 amd64
          build_deb linux/arm64 arm64
          # tarball: arch-independent SOURCE channel (run via uv/pipx — no per-arch binary).
          bash packaging/build-tarball.sh
          ls -l ./*.deb ./*.tar.gz

      - name: Release notes from CHANGELOG
        run: bash packaging/changelog-section.sh "${GITHUB_REF_NAME#v}" > notes.md

      - name: Create the three releases with the Linux assets
        run: |
          set -euo pipefail
          chmod +x packaging/forgejo-release.sh packaging/github-release.sh
          ASSETS=(./*.deb ./*.tar.gz)
          packaging/forgejo-release.sh forgejo.bryantserver.com \
            "${{ secrets.CLUSTER_FORGEJO_REPO_WRITE_PAT }}" "$GITHUB_REF_NAME" notes.md "${ASSETS[@]}"
          packaging/forgejo-release.sh forgejo.nas.bryantserver.com \
            "${{ secrets.NAS_FORGEJO_REPO_WRITE_PAT }}" "$GITHUB_REF_NAME" notes.md "${ASSETS[@]}"
          packaging/github-release.sh \
            "${{ secrets.GH_REPO_WRITE_PAT }}" "$GITHUB_REF_NAME" notes.md "${ASSETS[@]}"

  homebrew-tap:
    name: Update the Homebrew tap formula (stable or -rc per tag)
    needs: releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Fill the formula + push to the Forgejo tap (mirror carries it to GitHub + NAS)
        env:
          TOKEN: ${{ secrets.CLUSTER_FORGEJO_TAP_WRITE_PAT }}
        run: |
          set -euo pipefail
          # The tap is Forgejo-primary: write the formula here, and the tap's own sync_on_commit
          # push-mirror fans this commit out to GitHub (where `brew` fetches it) + NAS. A stable tag
          # writes Formula/dreame-valetudo.rb; a prerelease tag writes the separate
          # Formula/dreame-valetudo-rc.rb, so the stable formula never points at a candidate build.
          AUTH="http.extraheader=Authorization: Basic $(printf 'x-access-token:%s' "$TOKEN" | base64 | tr -d '\n')"
          git -c "$AUTH" clone "${GITHUB_SERVER_URL}/SisyphusMD/homebrew-tap.git" tap
          chmod +x packaging/update-tap.sh
          bash packaging/update-tap.sh "$GITHUB_REF_NAME" tap
          cd tap
          git config user.name "forgejo-actions[bot]"
          git config user.email "forgejo-actions[bot]@users.noreply.bryantserver.com"
          git add Formula/
          git commit -m "dreame-valetudo ${GITHUB_REF_NAME#v}" || { echo "no change to publish"; exit 0; }
          git -c "$AUTH" push

  reconcile:
    name: Reconcile releases across registries (bridge .pkgs to NAS, heal history)
    needs: releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0  # all tags needed for the reconcile loop
      - name: Wait for the current release's GitHub-built .pkgs, then reconcile every tag
        env:
          CLUSTER_TOKEN: ${{ secrets.CLUSTER_FORGEJO_REPO_WRITE_PAT }}
          NAS_TOKEN: ${{ secrets.NAS_FORGEJO_REPO_WRITE_PAT }}
          GH_TOKEN: ${{ secrets.GH_REPO_WRITE_PAT }}
        run: |
          set -uo pipefail
          API=https://forgejo.bryantserver.com/api/v1/repos/SisyphusMD/dreame-valetudo
          # The signed .pkgs build on GitHub (slow) and land on the public Forgejo release minutes
          # later. Wait so the current tag's .pkgs are in the union before the fan-out; a timeout just
          # defers them to the next release's reconcile.
          n=0
          for _ in $(seq 1 180); do
            n=$(curl -sf "$API/releases/tags/$GITHUB_REF_NAME" \
                | jq -r '[.assets[]?.name | select(endswith(".pkg"))] | length' 2>/dev/null || echo 0)
            [ "${n:-0}" -ge 2 ] && break
            sleep 10
          done
          [ "${n:-0}" -ge 2 ] || echo "::warning::current tag's .pkgs not present after 30m; reconcile fans out what exists and heals the rest next release"
          chmod +x packaging/reconcile-releases.sh packaging/forgejo-release.sh packaging/github-release.sh
          bash packaging/reconcile-releases.sh
