name: Publish

# Tag-triggered (from release.yml): build the .deb + tarball and create the release on each forge.
# The GitHub mirror's release-macos.yml appends the signed .pkg; the `nas-pkg` job here bridges
# that .pkg to the NAS. See packaging/README.md for the secrets.
on:
  push:
    # Stable (v1.2.3) and prerelease (v1.2.3-rc.N) tags both build here; the release helpers mark
    # the hyphenated ones as prereleases, and the homebrew-tap job below skips them.
    tags: ["v*.*.*", "v*.*.*-*"]

permissions:
  contents: read

jobs:
  releases:
    name: Build .deb + tarball, create releases (Forgejo, NAS, GitHub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable arm64 emulation (to build the arm64 sunxi-fel + bundle)
        run: |
          # setup-qemu-action can report success while leaving no usable handler (a stale binfmt
          # entry makes its installer skip), so drive binfmt directly: re-register from scratch
          # with the install output in this log. Best-effort — the build step probes emulation and
          # downgrades a broken QEMU to an arm64-only skip.
          # renovate: datasource=docker depName=tonistiigi/binfmt
          BINFMT="tonistiigi/binfmt:qemu-v10.2.3@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0"
          docker run --privileged --rm "$BINFMT" --uninstall qemu-aarch64 || true
          docker run --privileged --rm "$BINFMT" --install arm64 \
            || echo "::warning::binfmt install failed; the arm64 leg will be skipped by its probe"

      - name: Build per-arch bundles (main + fastboot client) + sunxi-fel, package the .debs + tarball
        run: |
          set -euo pipefail
          # Read the pins from the Python constants so there's ONE source of truth (Renovate-tracked).
          read_pin() { python3 -c "import re,sys; print(re.search(r'$1 = \"([^\"]+)\"', open('dreame_valetudo/constants.py').read()).group(1))"; }
          SREF="$(read_pin SUNXI_TOOLS_REF)"; PYUSB="$(read_pin PYUSB_VERSION)"
          export VERSION="${GITHUB_REF_NAME#v}"
          # nfpm packages the .debs. Pinned image; its digest IS the integrity check (Renovate-kept).
          # renovate: datasource=docker depName=goreleaser/nfpm
          NFPM="goreleaser/nfpm:v2.47.0@sha256:a662cb167d7b6d3a83920c83d76b12d02b8ac5dd2c13e5c62c15270b23f6df0c"
          # The bundle is per-arch (PyInstaller can't cross-compile), so each arch builds
          # sunxi-fel + the main bundle + the fastboot client inside a python:3.14 container of that
          # arch, then nfpm packages ./dist/* + ./sunxi-fel.
          # renovate: datasource=docker depName=python
          PYIMG="python:3.14.6-bookworm@sha256:5dcba30b5f8fbd97e2f35dd1b140b3c94db70bd01b39ed88365732f8db8f68b5"
          # renovate: datasource=pypi depName=pyinstaller
          PYINSTALLER="6.21.0"
          # The runner's docker daemon is a DinD sidecar that can't see the job workspace (a $PWD
          # bind-mount comes up empty), so each container gets the tree copied in and the build
          # products copied out over the API.
          build_arch() { # build_arch <docker-platform> <deb-arch>
            CID=$(docker create --platform "$1" -e SREF="$SREF" -e PYUSB="$PYUSB" -e PYINSTALLER="$PYINSTALLER" -w /w "$PYIMG" bash -c '
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq git make gcc pkg-config libusb-1.0-0-dev libfdt-dev zlib1g-dev
              pip install --quiet --root-user-action=ignore "pyinstaller==$PYINSTALLER" "pyusb==$PYUSB"
              git clone -q https://github.com/linux-sunxi/sunxi-tools.git /tmp/sx && git -C /tmp/sx checkout -q "$SREF"
              make -C /tmp/sx clean >/dev/null 2>&1 || true; make -C /tmp/sx sunxi-fel && cp /tmp/sx/sunxi-fel /w/sunxi-fel
              rm -rf /w/dist && bash packaging/build-bundle.sh /w/dist && bash packaging/build-fastboot-client.sh /w/dist')
            docker cp . "$CID":/w
            docker start -a "$CID"
            rm -rf dist sunxi-fel
            docker cp "$CID":/w/dist ./dist
            docker cp "$CID":/w/sunxi-fel ./sunxi-fel
            docker rm "$CID" >/dev/null
            CID=$(docker create -e DEB_ARCH="$2" -e VERSION -w /w "$NFPM" package -p deb -f packaging/nfpm.yaml -t "/w/dreame-valetudo_$2.deb")
            docker cp . "$CID":/w
            docker start -a "$CID"
            docker cp "$CID":"/w/dreame-valetudo_$2.deb" .
            docker rm "$CID" >/dev/null
          }
          build_arch linux/amd64 amd64
          # Probe emulation with the image the leg would build in anyway: broken QEMU must cost
          # only the arm64 .deb — never the amd64 .deb, tarball, releases, tap, or NAS bridge.
          # A real build failure under working emulation still fails the job loudly.
          if docker run --rm --platform linux/arm64 "$PYIMG" true 2>/dev/null; then
            build_arch linux/arm64 arm64
          else
            echo "::warning::arm64 emulation unavailable — skipping the arm64 .deb; fix emulation and re-run publish for this tag to append it"
          fi
          # tarball: arch-independent SOURCE channel (run via uv/pipx — no per-arch binary).
          bash packaging/build-tarball.sh
          ls -l ./*.deb ./*.tar.gz

      - name: Release notes from CHANGELOG
        run: bash packaging/changelog-section.sh "${GITHUB_REF_NAME#v}" > notes.md

      - name: Create the three releases with the Linux assets
        run: |
          set -euo pipefail
          chmod +x packaging/forgejo-release.sh packaging/github-release.sh
          ASSETS=(./*.deb ./*.tar.gz)
          packaging/forgejo-release.sh forgejo.bryantserver.com \
            "${{ secrets.CLUSTER_FORGEJO_REPO_WRITE_PAT }}" "$GITHUB_REF_NAME" notes.md "${ASSETS[@]}"
          packaging/forgejo-release.sh forgejo.nas.bryantserver.com \
            "${{ secrets.NAS_FORGEJO_REPO_WRITE_PAT }}" "$GITHUB_REF_NAME" notes.md "${ASSETS[@]}"
          packaging/github-release.sh \
            "${{ secrets.GH_REPO_WRITE_PAT }}" "$GITHUB_REF_NAME" notes.md "${ASSETS[@]}"

  homebrew-tap:
    name: Update the Homebrew tap formula
    # Stable only — brew must never track a prerelease (hyphenated tag).
    if: ${{ !contains(github.ref_name, '-') }}
    needs: releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Fill the formula + push to the Forgejo tap (mirror carries it to GitHub + NAS)
        env:
          TOKEN: ${{ secrets.CLUSTER_FORGEJO_TAP_WRITE_PAT }}
        run: |
          set -euo pipefail
          # The tap is Forgejo-primary (Forgejo is the source of truth): write the formula here, and
          # the tap's own sync_on_commit push-mirror fans this commit out to GitHub (where `brew`
          # fetches the tap from) + NAS — no explicit sync call, which a repo-scoped token can't make.
          AUTH="http.extraheader=Authorization: Basic $(printf 'x-access-token:%s' "$TOKEN" | base64 | tr -d '\n')"
          git -c "$AUTH" clone "${GITHUB_SERVER_URL}/SisyphusMD/homebrew-tap.git" tap
          chmod +x packaging/update-tap.sh
          bash packaging/update-tap.sh "$GITHUB_REF_NAME" tap
          cd tap
          git config user.name "forgejo-actions[bot]"
          git config user.email "forgejo-actions[bot]@users.noreply.bryantserver.com"
          git add Formula/dreame-valetudo.rb
          git commit -m "dreame-valetudo ${GITHUB_REF_NAME#v}" || { echo "no change to publish"; exit 0; }
          git -c "$AUTH" push

  nas-pkg:
    name: Bridge the macOS .pkg → NAS
    needs: releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Wait for the .pkg on the public Forgejo release, then copy to NAS
        run: |
          set -euo pipefail
          API=https://forgejo.bryantserver.com/api/v1/repos/SisyphusMD/dreame-valetudo
          # The .pkg is built + notarized on GitHub (slow), then appended to the public Forgejo
          # release. Wait for it (up to 30 min), then copy to NAS.
          urls=""
          for _ in $(seq 1 180); do
            urls=$(curl -sf "$API/releases/tags/$GITHUB_REF_NAME" \
              | jq -r '.assets[]? | select(.name | endswith(".pkg")) | .browser_download_url' || true)
            [ -n "$urls" ] && break
            sleep 10
          done
          if [ -z "$urls" ]; then
            echo "::warning::no .pkg on the Forgejo release after 30m; NAS release will lack it"
            exit 0
          fi
          # -f: an HTTP error must fail the job, not upload an error page to the NAS release as a .pkg.
          echo "$urls" | while read -r u; do [ -n "$u" ] || continue; curl -fsSL -O "$u" || exit 1; done
          bash packaging/changelog-section.sh "${GITHUB_REF_NAME#v}" > notes.md
          chmod +x packaging/forgejo-release.sh
          packaging/forgejo-release.sh forgejo.nas.bryantserver.com \
            "${{ secrets.NAS_FORGEJO_REPO_WRITE_PAT }}" "$GITHUB_REF_NAME" notes.md ./*.pkg
