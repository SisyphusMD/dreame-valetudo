name: CI

# Lint + tests on every PR and push to main: pinned shellcheck +
# a Python lint/typecheck/test job + a build job + integration scripts, with integration gated
# behind lint. Make this a required check on main so releases (cut from main by release.yml) only
# ever ship a green tree.
#
# The runner is self-hosted with network reach into the home cluster, so the code-executing jobs
# (python runs the PR's conftest/tests, build builds+runs the PR tree, integration bash-runs the
# PR's scripts) run only for trusted refs — pushes and same-repo PRs. A fork pull_request carries
# attacker-controlled code, so those jobs are skipped for it; forks get shellcheck only (it reads
# the scripts, never executes them). Fork PRs get full validation once a maintainer pushes the
# branch here or the PR comes from this repo. (Gating in-file is the only lever available; routing
# forks to a separate ephemeral non-cluster runner can't be expressed from this workflow alone.)
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: shellcheck
        uses: docker://koalaman/shellcheck:v0.11.0@sha256:61862eba1fcf09a484ebcc6feea46f1782532571a34ed51fedf90dd25f925a8d
        with:
          args: >-
            --severity=warning
            packaging/build-tarball.sh packaging/build-bundle.sh packaging/build-fastboot-client.sh
            packaging/changelog-section.sh
            packaging/forgejo-release.sh packaging/github-release.sh packaging/release-common.sh
            packaging/reconcile-releases.sh
            packaging/update-tap.sh packaging/deb-postinstall.sh
            tests/integration/release-scripts.sh tests/integration/reconcile.sh

  python:
    # trusted-ref gate (see header): don't run PR-supplied pytest on the self-hosted runner
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          # renovate: datasource=github-tags depName=python/cpython versioning=pep440
          python-version: "3.14.6"   # exact pin (repo convention); Renovate bumps the patch
      - name: lint + typecheck + test
        run: |
          # Pin the dev toolchain (kept in lockstep with uv.lock): CI ran these unpinned, so an
          # upstream release (e.g. a ruff that enforces a new lint) could redden main with no code
          # change. Renovate bumps these via the `# renovate:` custom manager — surfaced as a
          # green-gated PR, not a surprise on main.
          # renovate: datasource=pypi depName=ruff
          RUFF="0.16.0"
          # renovate: datasource=pypi depName=mypy
          MYPY="2.3.0"
          # renovate: datasource=pypi depName=pytest
          PYTEST="9.1.1"
          python -m pip install --upgrade pip
          pip install "ruff==$RUFF" "mypy==$MYPY" "pytest==$PYTEST"
          ruff check dreame_valetudo libexec tests/python
          mypy
          pytest -q tests/python

  build:
    # Compile-check the release-time build path on every push, so Renovate can automerge dep bumps
    # safely: a break here fails the PR before it can merge. Exercises the SAME buildx + deb.Dockerfile
    # + nfpm path publish.yml uses (amd64 only — native + fast; the arm64 leg's emulation is exercised
    # at release time). Covers sunxi-fel, the PyInstaller bundle (pyusb + pyinstaller), and the .deb.
    # sunxi + pyusb come from the Python constants; pyinstaller + nfpm are pinned here and kept in
    # lockstep with the release workflows by Renovate (same depName, one grouped PR).
    # trusted-ref gate (see header): don't build+run PR-supplied code on the self-hosted runner
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: build the bundle via buildx (deb.Dockerfile) + package the .deb + .rpm (release-time deps)
        run: |
          set -euo pipefail
          read_pin() { python3 -c "import re; print(re.search(r'$1 = \"([^\"]+)\"', open('dreame_valetudo/constants.py').read()).group(1))"; }
          SREF="$(read_pin SUNXI_TOOLS_REF)"; PYUSB="$(read_pin PYUSB_VERSION)"
          echo "using sunxi $SREF, pyusb $PYUSB"
          # renovate: datasource=pypi depName=pyinstaller
          PYINSTALLER="6.21.0"
          # renovate: datasource=docker depName=goreleaser/nfpm
          NFPM="goreleaser/nfpm:v2.47.0@sha256:a662cb167d7b6d3a83920c83d76b12d02b8ac5dd2c13e5c62c15270b23f6df0c"
          docker buildx build --platform linux/amd64 \
            --build-arg SREF="$SREF" --build-arg PYUSB="$PYUSB" --build-arg PYINSTALLER="$PYINSTALLER" \
            -f packaging/deb.Dockerfile --target export --output type=local,dest=out .
          chmod +x out/dreame-valetudo out/dreame-fastboot out/sunxi-fel
          ./out/dreame-valetudo version                        # the frozen binary runs
          rm -rf dist && mkdir dist
          cp out/dreame-valetudo out/dreame-fastboot dist/
          cp out/sunxi-fel ./sunxi-fel
          # nfpm packages via docker create+cp: the DinD daemon can't bind-mount the job workspace.
          CID=$(docker create -e DEB_ARCH=amd64 -e VERSION=0.0.0-ci -w /w "$NFPM" package -p deb -f packaging/nfpm.yaml -t /w/ci.deb)
          docker cp . "$CID":/w
          docker start -a "$CID"
          docker cp "$CID":/w/ci.deb ./ci.deb
          docker rm "$CID" >/dev/null
          dpkg-deb -c ci.deb | grep -E '/(dreame-valetudo|dreame-fastboot|sunxi-fel)$'
          # Also build the .rpm from the same binaries: validates the rpm overrides/config (it ships in
          # publish.yml). rpm tooling isn't on the runner to inspect, so just confirm it's non-empty.
          CIDR=$(docker create -e DEB_ARCH=amd64 -e VERSION=0.0.0 -w /w "$NFPM" package -p rpm -f packaging/nfpm.yaml -t /w/ci.rpm)
          docker cp . "$CIDR":/w
          docker start -a "$CIDR"
          docker cp "$CIDR":/w/ci.rpm ./ci.rpm
          docker rm "$CIDR" >/dev/null
          test -s ci.rpm
          echo "build OK: bundle (buildx) + sunxi-fel + .deb + .rpm all built from the pinned deps"

  integration:
    needs: [shellcheck]
    # trusted-ref gate (see header): don't bash-run PR-supplied scripts on the self-hosted runner
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: run integration scripts (externals PATH-stubbed; no hardware)
        run: |
          for t in tests/integration/release-scripts.sh tests/integration/reconcile.sh; do echo "== $t =="; bash "$t"; done
